services:
  # Vite dev server — no Node.js/npm needed on host; hot reload in Docker
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: iam-dashboard-frontend
    ports:
      - "3001:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      # Dev-only mode switch for frontend data sources:
      # - mock: UI uses local fixtures (no backend required)
      # - live: /scan → API Gateway via Vite proxy; IR/LLM → Flask via /api/v1 proxy (see vite.config)
      - VITE_DATA_MODE=${VITE_DATA_MODE:-live}
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3001}
      - VITE_IR_API_BASE=${VITE_IR_API_BASE:-http://localhost:3001/api/v1}
      # Browser → Flask for CSV export; matches app service ports 5001:5000 on the host.
      # Local `npm run dev`: omit in .env so Vite proxies `/api/findings` (see vite.config.ts).
      - VITE_FLASK_API_URL=${VITE_FLASK_API_URL:-http://localhost:5001}
      - VITE_FLASK_PROXY_TARGET=${VITE_FLASK_PROXY_TARGET:-http://app:5000}
      - VITE_LLM_MAX_CONCURRENT=${VITE_LLM_MAX_CONCURRENT:-2}
      # Keep compatibility with older env naming if someone still exports it.
      - VITE_API_GATEWAY_URL=${VITE_API_GATEWAY_URL:-}
    networks:
      - cybersecurity-network
    stdin_open: true
    tty: true

  # Main Flask application
  app:
    build: .
    container_name: cybersecurity-dashboard
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=postgresql://postgres:password@db:5432/cybersecurity_db
      - REDIS_URL=redis://redis:6379/0
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # Bedrock + Polly: boto/ir.py read AWS_DEFAULT_REGION; align with AWS_REGION if unset
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-${AWS_REGION:-us-east-1}}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # Required for /api/v1/llm/* and /api/v1/voice/intent in Docker — set in host .env (never commit)
      - BEDROCK_API_KEY=${BEDROCK_API_KEY:-}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-anthropic.claude-haiku-4-5}
      - SMTP_HOST=${SMTP_HOST:-mailhog}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-no-reply@local.test}
      - PASSWORD_RESET_TOKEN_SECRET=${PASSWORD_RESET_TOKEN_SECRET:-local-dev-reset-secret-do-not-use-in-prod}
      # Optional: comma-separated origins for Flask-CORS (defaults in app.py match infra allowed_urls)
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - db
      - redis
    networks:
      - cybersecurity-network
    restart: unless-stopped

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: cybersecurity-db
    environment:
      - POSTGRES_DB=cybersecurity_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - cybersecurity-network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: cybersecurity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cybersecurity-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # MailHog for local SMTP testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: cybersecurity-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - cybersecurity-network
    restart: unless-stopped

  # Grafana for data visualization
  grafana:
    image: grafana/grafana:10.2.3
    container_name: cybersecurity-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - cybersecurity-network
    restart: unless-stopped
    depends_on:
      - app

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: cybersecurity-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - cybersecurity-network
    restart: unless-stopped

  # OPA Policy Scanner
  opa-scanner:
    image: openpolicyagent/opa:0.58.0
    container_name: opa-scanner
    volumes:
      - .:/workspace:ro
      - ./DevSecOps/opa-policies:/policies:ro
    working_dir: /workspace
    command: test /policies/ --format json
    profiles:
      - scanners
    networks:
      - cybersecurity-network

  # Checkov Infrastructure Scanner
  checkov-scanner:
    image: bridgecrew/checkov:3.1.25
    container_name: checkov-scanner
    volumes:
      - .:/workspace:ro
    working_dir: /workspace
    command: -d /workspace --framework terraform --framework dockerfile --output json --quiet --skip-check CKV_AWS_1,CKV_AWS_2,CKV_AWS_3
    profiles:
      - scanners
    networks:
      - cybersecurity-network

  # Gitleaks Secret Scanner
  gitleaks-scanner:
    image: zricethezav/gitleaks:v8.18.0
    container_name: gitleaks-scanner
    volumes:
      - .:/workspace:ro
    working_dir: /workspace
    command: detect --config /workspace/DevSecOps/.gitleaks.toml --source /workspace --no-git --report-format json
    profiles:
      - scanners
    networks:
      - cybersecurity-network

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:

networks:
  cybersecurity-network:
    driver: bridge
